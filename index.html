<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Crossword Builder – Symmetric Edition</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 1rem; display: flex; gap: 1.5rem; background: #f5f5f5; }
  #left, #right { background: #fff; padding: 1rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  #left { flex: 0 0 320px; }
  #right { flex: 1; }
  #grid { display: inline-grid; gap: 1px; background: #111; padding: 4px; border-radius: 4px; }
  .cell { width: 28px; height: 28px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
  .cell.block { background: #111; }
  .cell input { width: 100%; height: 100%; border: none; text-align: center; font-size: 0.9rem; background: transparent; }
  .number { position: absolute; top: 1px; left: 2px; font-size: 0.55rem; }
</style>
</head>
<body>

<div id="left">
  <h1>Crossword Builder</h1>
  <textarea id="pairs" placeholder="CAT | Small pet"></textarea>
  <select id="size">
    <option value="15" selected>15 × 15</option>
    <option value="21">21 × 21</option>
  </select>
  <button id="build">Build</button>
  <button id="autofill" disabled>Auto‑fill</button>
</div>

<div id="right">
  <div id="grid"></div>
  <div id="clues">
    <h3>Across</h3><div id="across-list"></div>
    <h3>Down</h3><div id="down-list"></div>
  </div>
</div>

<script>
let gridSize = 15;
let grid = [];
let entries = [];
let DICTIONARY = [];

// Load full dictionary
fetch("dictionary/words.txt")
  .then(r => r.text())
  .then(t => {
    DICTIONARY = t.split(/\r?\n/).map(w => w.trim().toUpperCase()).filter(w => w.length > 1);
    console.log("Dictionary loaded:", DICTIONARY.length, "words");
  });

document.getElementById("size").addEventListener("change", e => {
  gridSize = parseInt(e.target.value, 10);
});

document.getElementById("build").addEventListener("click", () => {
  const pairs = parsePairs(document.getElementById("pairs").value);
  initGrid();
  placeGivenAnswers(pairs);
  numberAndRender();
  document.getElementById("autofill").disabled = false;
});

document.getElementById("autofill").addEventListener("click", () => {
  autoFill();
  numberAndRender();
});

function parsePairs(text) {
  return text.split("\n").map(l => l.trim()).filter(Boolean).map(line => {
    const [a, c] = line.split("|");
    return { answer: a.trim().toUpperCase(), clue: (c || "").trim() };
  });
}

function initGrid() {
  grid = Array.from({ length: gridSize }, () =>
    Array.from({ length: gridSize }, () => ({ char: "", block: false }))
  );
  entries = [];
}

function toggleBlock(r, c) {
  const symR = gridSize - 1 - r;
  const symC = gridSize - 1 - c;

  const newState = !grid[r][c].block;
  grid[r][c].block = newState;
  grid[symR][symC].block = newState;

  if (newState) {
    grid[r][c].char = "";
    grid[symR][symC].char = "";
  }
}

function placeGivenAnswers(pairs) {
  if (pairs.length === 0) return;
  const mid = Math.floor(gridSize / 2);
  const first = pairs[0];

  const startCol = mid - Math.floor(first.answer.length / 2);
  for (let i = 0; i < first.answer.length; i++) {
    grid[mid][startCol + i].char = first.answer[i];
  }

  entries.push({
    id: "A1",
    row: mid,
    col: startCol,
    len: first.answer.length,
    dir: "across",
    clue: first.clue,
    answer: first.answer
  });
}

function numberAndRender() {
  renderGrid();
  renderClues();
}

function renderGrid() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML = "";
  gridEl.style.gridTemplateColumns = `repeat(${gridSize}, 28px)`;

  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const cell = document.createElement("div");
      cell.className = "cell" + (grid[r][c].block ? " block" : "");
      cell.dataset.r = r;
      cell.dataset.c = c;

      if (!grid[r][c].block) {
        const input = document.createElement("input");
        input.value = grid[r][c].char;
        input.maxLength = 1;
        input.addEventListener("input", e => {
          grid[r][c].char = e.target.value.toUpperCase();
        });
        cell.appendChild(input);
      }

      cell.addEventListener("click", e => {
        if (e.target.tagName !== "INPUT") {
          toggleBlock(r, c);
          numberAndRender();
        }
      });

      gridEl.appendChild(cell);
    }
  }
}

function renderClues() {
  document.getElementById("across-list").innerHTML = "(clue extraction not shown here)";
  document.getElementById("down-list").innerHTML = "(clue extraction not shown here)";
}

function autoFill() {
  // Very simple pattern matching
  entries.forEach(e => {
    const pattern = e.answer.replace(/\./g, ".");
    const regex = new RegExp("^" + pattern + "$");
    const candidate = DICTIONARY.find(w => w.length === e.len && regex.test(w));
    if (candidate) {
      e.answer = candidate;
    }
  });
}
</script>
</body>
</html>
