<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Crossword Builder – Drag & Drop Themes</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 1rem;
    display: flex;
    gap: 1.5rem;
    background: #f5f5f5;
  }

  #left, #right {
    background: #fff;
    padding: 1rem;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  #left {
    flex: 0 0 320px;
  }

  #right {
    flex: 1;
    min-width: 0;
  }

  textarea {
    width: 100%;
    box-sizing: border-box;
    min-height: 120px;
    resize: vertical;
  }

  button {
    margin-top: 0.5rem;
    margin-right: 0.5rem;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
  }

  button.primary {
    background: #2563eb;
    color: #fff;
  }

  button.secondary {
    background: #6b7280;
    color: #fff;
  }

  #grid {
    display: inline-grid;
    gap: 1px;
    background: #111;
    padding: 4px;
    border-radius: 4px;
  }

  .cell {
    width: 28px;
    height: 28px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }

  .cell.block {
    background: #111;
  }

  .cell input {
    width: 100%;
    height: 100%;
    border: none;
    text-align: center;
    font-size: 0.9rem;
    background: transparent;
    outline: none;
  }

  .cell.theme-locked {
    background: #e0f2fe;
  }

  .number {
    position: absolute;
    top: 1px;
    left: 2px;
    font-size: 0.55rem;
  }

  #theme-list {
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }

  .theme-item {
    padding: 3px 6px;
    margin-bottom: 3px;
    border-radius: 4px;
    border: 1px dashed #9ca3af;
    cursor: grab;
    background: #f9fafb;
  }

  .theme-item.dragging {
    opacity: 0.5;
  }

  /* Popup below the cell */
  #direction-popup {
    position: absolute;
    background: #ffffff;
    border: 1px solid #d1d5db;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 0.85rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    z-index: 9999;
    display: none;
  }

  #direction-popup button {
    margin: 4px 4px 0 0;
    padding: 3px 6px;
    font-size: 0.8rem;
  }

  #status {
    font-size: 0.8rem;
    color: #4b5563;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<div id="left">
  <h1>Crossword Builder</h1>
  <p style="font-size:0.85rem;color:#4b5563;">
    One per line: <strong>ANSWER | clue text</strong><br>
    Spaces in answers are removed automatically.
  </p>
  <textarea id="pairs" placeholder="SOLAR POWER | Album by Lorde&#10;MOON LIGHT | Best Picture winner"></textarea>
  <button id="build" class="primary">Build grid & themes</button>

  <div id="status"></div>

  <h3 style="margin-top:1rem;">Theme entries</h3>
  <div id="theme-list"></div>
</div>

<div id="right">
  <div style="margin-bottom:0.5rem; display:flex; gap:1rem; align-items:center; font-size:0.85rem;">
    <button id="theme-mode-btn" class="secondary">
      Theme Placement Mode: OFF
    </button>
    <div><strong>Hint:</strong> Drag a theme onto a cell.</div>
  </div>

  <div id="grid"></div>
</div>

<!-- Popup for Across/Down selection -->
<div id="direction-popup">
  <div id="popup-title" style="margin-bottom:4px; font-weight:600;"></div>
  <button id="popup-across">Across</button>
  <button id="popup-down">Down</button>
</div>

<script>
(function() {
  const size = 15;
  const gridEl = document.getElementById('grid');
  const pairsEl = document.getElementById('pairs');
  const buildBtn = document.getElementById('build');
  const themeListEl = document.getElementById('theme-list');
  const statusEl = document.getElementById('status');
  const themeModeBtn = document.getElementById('theme-mode-btn');

  const popupEl = document.getElementById('direction-popup');
  const popupTitleEl = document.getElementById('popup-title');
  const popupAcrossBtn = document.getElementById('popup-across');
  const popupDownBtn = document.getElementById('popup-down');

  let themeMode = false;
  let grid = [];
  let themes = [];
  let currentDrop = null; // { answer, clue, row, col }

  function initGrid() {
    grid = [];
    gridEl.innerHTML = '';
    gridEl.style.gridTemplateColumns = `repeat(${size}, 28px)`;

    for (let r = 0; r < size; r++) {
      const row = [];
      for (let c = 0; c < size; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = r;
        cell.dataset.col = c;

        const input = document.createElement('input');
        input.maxLength = 1;
        input.addEventListener('input', () => {
          input.value = input.value.toUpperCase().replace(/[^A-Z]/g, '');
        });

        cell.appendChild(input);

        cell.addEventListener('click', (e) => {
          if (!themeMode) {
            // Toggle block
            if (cell.classList.contains('block')) {
              cell.classList.remove('block');
              input.style.visibility = 'visible';
            } else {
              cell.classList.add('block');
              input.value = '';
              input.style.visibility = 'hidden';
              cell.classList.remove('theme-locked');
            }
          }
        });

        // Drag-and-drop targets only in theme mode
        cell.addEventListener('dragover', (e) => {
          if (!themeMode) return;
          e.preventDefault();
        });

        cell.addEventListener('drop', (e) => {
          if (!themeMode) return;
          e.preventDefault();
          const themeIndex = e.dataTransfer.getData('text/plain');
          const theme = themes[themeIndex];
          if (!theme) return;

          const row = parseInt(cell.dataset.row, 10);
          const col = parseInt(cell.dataset.col, 10);

          currentDrop = {
            themeIndex,
            answer: theme.answer,
            clue: theme.clue,
            row,
            col
          };

          showDirectionPopupBelowCell(cell, theme.answer);
        });

        gridEl.appendChild(cell);
        row.push({ cell, input, block: false });
      }
      grid.push(row);
    }
  }

  function parsePairs() {
    const lines = pairsEl.value.split('\n').map(l => l.trim()).filter(Boolean);
    const parsed = [];
    for (const line of lines) {
      const parts = line.split('|');
      if (parts.length < 1) continue;
      const answerRaw = parts[0].trim();
      if (!answerRaw) continue;
      const clue = (parts[1] || '').trim();
      const answer = answerRaw.replace(/\s+/g, '').toUpperCase();
      parsed.push({ answer, clue, raw: answerRaw });
    }
    return parsed;
  }

  function renderThemes() {
    themeListEl.innerHTML = '';
    themes.forEach((t, idx) => {
      const div = document.createElement('div');
      div.className = 'theme-item';
      div.draggable = true;
      div.textContent = t.answer + (t.clue ? ' – ' + t.clue : '');
      div.addEventListener('dragstart', (e) => {
        div.classList.add('dragging');
        e.dataTransfer.setData('text/plain', String(idx));
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
      });
      themeListEl.appendChild(div);
    });
  }

  function showDirectionPopupBelowCell(cell, answer) {
    const rect = cell.getBoundingClientRect();
    const scrollX = window.scrollX || window.pageXOffset;
    const scrollY = window.scrollY || window.pageYOffset;

    popupTitleEl.textContent = `Place ${answer}`;
    popupEl.style.display = 'block';

    // Position BELOW the cell (C2)
    popupEl.style.left = (rect.left + scrollX) + 'px';
    popupEl.style.top = (rect.bottom + scrollY + 4) + 'px';
  }

  function hideDirectionPopup() {
    popupEl.style.display = 'none';
    currentDrop = null;
  }

  function placeTheme(direction) {
    if (!currentDrop) return;
    const { themeIndex, answer, row, col } = currentDrop;

    const dr = direction === 'across' ? 0 : 1;
    const dc = direction === 'across' ? 1 : 0;

    // Check fit
    for (let i = 0; i < answer.length; i++) {
      const r = row + dr * i;
      const c = col + dc * i;
      if (r < 0 || r >= size || c < 0 || c >= size) {
        alert('Does not fit in grid.');
        hideDirectionPopup();
        return;
      }
      const cellObj = grid[r][c];
      if (cellObj.cell.classList.contains('block')) {
        alert('Overlaps a block.');
        hideDirectionPopup();
        return;
      }
      const existing = cellObj.input.value.toUpperCase();
      const ch = answer[i];
      if (existing && existing !== ch) {
        alert('Conflicts with existing letter.');
        hideDirectionPopup();
        return;
      }
    }

    // Place letters
    for (let i = 0; i < answer.length; i++) {
      const r = row + dr * i;
      const c = col + dc * i;
      const cellObj = grid[r][c];
      cellObj.input.value = answer[i];
      cellObj.cell.classList.add('theme-locked');
    }

    // Optionally mark theme as used (you can extend this)
    themes[themeIndex].used = true;

    hideDirectionPopup();
  }

  popupAcrossBtn.addEventListener('click', () => placeTheme('across'));
  popupDownBtn.addEventListener('click', () => placeTheme('down'));

  document.addEventListener('click', (e) => {
    if (!popupEl.contains(e.target) && e.target.id !== 'direction-popup') {
      if (popupEl.style.display === 'block') {
        hideDirectionPopup();
      }
    }
  });

  buildBtn.addEventListener('click', () => {
    themes = parsePairs();
    renderThemes();
    initGrid();
    statusEl.textContent = `Loaded ${themes.length} theme entries. Drag them onto the grid in Theme Placement Mode.`;
  });

  themeModeBtn.addEventListener('click', () => {
    themeMode = !themeMode;
    themeModeBtn.textContent = `Theme Placement Mode: ${themeMode ? 'ON' : 'OFF'}`;
    themeModeBtn.className = themeMode ? 'secondary' : 'secondary';
    statusEl.textContent = themeMode
      ? 'Theme Placement Mode ON: drag themes onto cells to place them.'
      : 'Theme Placement Mode OFF: click cells to toggle blocks, type letters.';
  });

  // Initialize empty grid on load
  initGrid();
})();
</script>

</body>
</html>
